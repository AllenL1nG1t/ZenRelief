<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>Zen Relief · 解压小游戏</title>
  <meta name="description" content="A satisfying stress-relief mini-game collection. Pop bubbles, squish balls, and relax." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== MAIN MENU ===== -->
  <div id="menu-screen" class="screen active">
    <div class="menu-bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="menu-content">
      <h1 class="menu-title">
        <span class="title-zen">Zen</span>
        <span class="title-relief">Relief</span>
      </h1>
      <p class="menu-subtitle">选择你的放松方式</p>
      <div class="game-cards">
        <button class="game-card" id="btn-bubble" onclick="switchScreen('bubble-screen')">
          <div class="card-icon">🫧</div>
          <div class="card-info">
            <h2>泡泡纸</h2>
            <p>戳破每一个泡泡</p>
          </div>
          <div class="card-arrow">→</div>
        </button>
        <button class="game-card" id="btn-squishy" onclick="switchScreen('squishy-screen')">
          <div class="card-icon">🔮</div>
          <div class="card-info">
            <h2>弹力球</h2>
            <p>按压柔软的弹力球</p>
          </div>
          <div class="card-arrow">→</div>
        </button>
        <button class="game-card" id="btn-slime" onclick="switchScreen('slime-screen')">
          <div class="card-icon">🎨</div>
          <div class="card-info">
            <h2>解压切割</h2>
            <p>切割彩色方块</p>
          </div>
          <div class="card-arrow">→</div>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== BUBBLE WRAP SCREEN ===== -->
  <div id="bubble-screen" class="screen">
    <header class="game-header">
      <button class="back-btn" onclick="switchScreen('menu-screen')">← 返回</button>
      <h2>泡泡纸</h2>
      <button class="reset-btn" id="bubble-reset-btn" onclick="resetBubbles()">刷新</button>
    </header>
    <div class="game-area">
      <div class="bubble-stats">
        <span id="pop-count">0</span> / <span id="pop-total">0</span> 已戳破
      </div>
      <div id="bubble-grid" class="bubble-grid"></div>
    </div>
  </div>

  <!-- ===== SQUISHY BALL SCREEN ===== -->
  <div id="squishy-screen" class="screen">
    <header class="game-header">
      <button class="back-btn" onclick="switchScreen('menu-screen')">← 返回</button>
      <h2>弹力球</h2>
      <button class="reset-btn" onclick="resetSquishy()">换色</button>
    </header>
    <div class="game-area squishy-area">
      <canvas id="squishy-canvas"></canvas>
      <p class="squishy-hint">按住并拖动球体</p>
    </div>
  </div>

  <!-- ===== SLICE SCREEN ===== -->
  <div id="slime-screen" class="screen">
    <header class="game-header">
      <button class="back-btn" onclick="switchScreen('menu-screen')">← 返回</button>
      <h2>解压切割</h2>
      <button class="reset-btn" onclick="resetSlice()">刷新</button>
    </header>
    <div class="game-area slice-area">
      <canvas id="slice-canvas"></canvas>
      <p class="squishy-hint">点击方块来切割它</p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
